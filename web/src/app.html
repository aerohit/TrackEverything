<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Track" />
    <meta name="theme-color" content="#f3f4f7" />
    <link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
    <title>TrackEverything</title>
    <script>
      // Resolve light/dark before first paint to avoid a flash.
      try {
        var p = localStorage.getItem("te_theme") || "system";
        var dark = p === "dark" ||
          (p === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.dataset.theme = dark ? "dark" : "light";
      } catch (e) {}
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
