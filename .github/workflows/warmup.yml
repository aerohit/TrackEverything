name: Warm-up

# Keeps the deployed app responsive by hitting it on a schedule and right after a
# deploy. `/health?warm=1` boots a (possibly cold) Deno isolate AND runs a tiny
# `select 1`, which keeps the pooled DB connection — and a free-tier Supabase
# project, which pauses after ~7 days idle — warm. See backend/docs/deploy.md.
#
# Caveat: GitHub runners are US-based, so this warms whichever Deno region is
# nearest them (not necessarily yours). It reliably prevents the Supabase pause;
# your own region's cold start is mitigated by the startup connection warm in
# main.ts. For per-region warming, point an EU-based uptime monitor at the same URL.

on:
  schedule:
    - cron: "0 * * * *" # hourly
  push:
    branches: [main] # warm right after a deploy
  workflow_dispatch: {} # manual trigger

# A single in-flight run is enough; cancel an older one if a new trigger arrives.
concurrency:
  group: warmup
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      APP_URL: ${{ vars.APP_URL || 'https://trackeverything.aerohit.deno.net' }}
    steps:
      - name: Wait for the deploy to roll out
        if: github.event_name == 'push'
        run: sleep 60

      - name: Warm the isolate + DB connection
        run: |
          url="${APP_URL%/}/health?warm=1"
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /tmp/body -w "%{http_code}" --max-time 30 "$url" || echo 000)
            echo "attempt $i -> HTTP $code: $(cat /tmp/body)"
            if [ "$code" = "200" ] && grep -q '"db":true' /tmp/body; then
              echo "warm — isolate up and database reachable"
              exit 0
            fi
            sleep 15
          done
          # Don't fail the workflow on a transient miss; the next run will try again.
          echo "::warning::warm-up did not confirm db:true after 5 attempts"
