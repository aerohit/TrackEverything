name: CI

on:
  push:
  pull_request:

jobs:
  # Guard: no secret/env files should ever be committed (the template is the exception).
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: No committed env / secret files
        run: |
          bad=$(git ls-files | grep -E '(^|/)\.env($|\.)|(^|/)secrets/' | grep -v '^\.env\.example$' || true)
          if [ -n "$bad" ]; then
            echo "::error::These look like secret files and must not be tracked:"; echo "$bad"; exit 1
          fi
          echo "OK — no committed env/secret files."

  # Hono API + Drizzle data layer + shared Zod schemas (server/, db/, shared/).
  server:
    runs-on: ubuntu-latest

    # Ephemeral Postgres so the DB integration tests exercise a real database.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check formatting
        run: deno task fmt:check

      - name: Lint
        run: deno task lint

      - name: Type-check
        run: deno task check

      - name: Run tests (unit + integration)
        run: deno task test

  # SvelteKit PWA (web/) — type-check, unit tests, and a production build.
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Type-check
        run: npm run check
      - name: Unit tests
        run: npm test
      - name: Build
        run: npm run build
